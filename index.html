<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#056438" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo-160.png" />
    <title>StylTaxi — Premium Taxi & Airport Transfers in Barcelona</title>
    <meta name="description" content="Reliable premium taxi service in Barcelona. Airport transfers, city rides, business travel and long-distance transport, available 24 hours." />
    <!-- Fonts are self-hosted (see src/index.css @font-face). Preload the two
         that render above the fold so text is styled without a flash. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-400.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/sora-800.woff2" crossorigin />
    <link
      rel="preload"
      as="image"
      href="/images/hero-800.webp"
      imagesrcset="/images/hero-800.webp 800w, /images/hero-1400.webp 1400w"
      imagesizes="100vw"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
